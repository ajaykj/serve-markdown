<svg xmlns="http://www.w3.org/2000/svg" width="1544" height="500" viewBox="0 0 1544 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#533483;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1544" height="500" fill="url(#bg)" />

  <!-- Accent bar top -->
  <rect width="1544" height="6" fill="url(#accent)" />

  <!-- Decorative code-block shapes -->
  <rect x="900" y="60" width="580" height="380" rx="12" fill="#0f3460" fill-opacity="0.4" />
  <rect x="920" y="80" width="540" height="340" rx="8" fill="#000d1a" fill-opacity="0.6" />

  <!-- Fake code lines -->
  <rect x="944" y="110" width="200" height="10" rx="5" fill="#533483" fill-opacity="0.8" />
  <rect x="944" y="134" width="300" height="10" rx="5" fill="#4a9eff" fill-opacity="0.5" />
  <rect x="944" y="158" width="260" height="10" rx="5" fill="#4a9eff" fill-opacity="0.3" />
  <rect x="960" y="182" width="180" height="10" rx="5" fill="#7ecfff" fill-opacity="0.4" />
  <rect x="960" y="206" width="220" height="10" rx="5" fill="#7ecfff" fill-opacity="0.3" />
  <rect x="960" y="230" width="140" height="10" rx="5" fill="#7ecfff" fill-opacity="0.2" />
  <rect x="944" y="254" width="280" height="10" rx="5" fill="#4a9eff" fill-opacity="0.4" />
  <rect x="944" y="278" width="200" height="10" rx="5" fill="#533483" fill-opacity="0.6" />
  <rect x="944" y="302" width="320" height="10" rx="5" fill="#4a9eff" fill-opacity="0.3" />
  <rect x="944" y="326" width="160" height="10" rx="5" fill="#7ecfff" fill-opacity="0.4" />
  <rect x="944" y="350" width="240" height="10" rx="5" fill="#4a9eff" fill-opacity="0.3" />
  <rect x="944" y="374" width="180" height="10" rx="5" fill="#533483" fill-opacity="0.5" />

  <!-- Markdown "M↓" icon circle -->
  <circle cx="180" cy="210" r="90" fill="url(#accent)" fill-opacity="0.9" />
  <text x="180" y="235" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">M↓</text>

  <!-- Plugin name -->
  <text x="300" y="185" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-1">Serve Markdown</text>

  <!-- Tagline -->
  <text x="300" y="240" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="30" font-weight="400" fill="#7ecfff" letter-spacing="0.5">Serve clean Markdown to AI agents and crawlers</text>

  <!-- Pill badges -->
  <rect x="300" y="270" width="150" height="36" rx="18" fill="#0f3460" />
  <text x="375" y="293" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" fill="#4a9eff" text-anchor="middle">Content Negotiation</text>

  <rect x="464" y="270" width="110" height="36" rx="18" fill="#0f3460" />
  <text x="519" y="293" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" fill="#4a9eff" text-anchor="middle">.md URLs</text>

  <rect x="588" y="270" width="130" height="36" rx="18" fill="#0f3460" />
  <text x="653" y="293" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" fill="#4a9eff" text-anchor="middle">Crawler Logs</text>

  <!-- Accent bar bottom -->
  <rect y="494" width="1544" height="6" fill="url(#accent)" />
</svg>
